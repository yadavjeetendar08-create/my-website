<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw Record - RajaLuck</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #fb5b5b; --bg: #f8f9fb; --white: #fff; --gray: #999; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); color: #333; }
        
        /* Header */
        .header { background: var(--white); padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header i { font-size: 18px; cursor: pointer; width: 30px; }
        .header h2 { margin: 0; font-size: 18px; font-weight: bold; flex: 1; text-align: center; margin-right: 30px; }

        /* Method Tabs */
        .tab-scroll { display: flex; gap: 10px; padding: 12px 15px; overflow-x: auto; background: var(--white); scrollbar-width: none; }
        .tab-scroll::-webkit-scrollbar { display: none; }
        .tab { background: #f5f5f5; color: #666; padding: 8px 18px; border-radius: 5px; font-size: 12px; font-weight: bold; white-space: nowrap; cursor: pointer; border: none; display: flex; align-items: center; gap: 5px; }
        .tab.active { background: var(--primary); color: var(--white); }
        .tab i { font-size: 14px; }

        .filters { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; padding: 10px 15px; }
        .f-select { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 5px; font-size: 12px; color: #666; text-align: center; }

        /* Dynamic Withdrawal Cards */
        .card { background: #fff; margin: 0 15px 15px; border-radius: 12px; padding: 15px; box-shadow: 0 2px 6px rgba(0,0,0,0.03); }
        .card-header { display: flex; justify-content: space-between; margin-bottom: 15px; }
        .tag { background: var(--primary); color: white; padding: 3px 10px; border-radius: 4px; font-size: 11px; font-weight: bold; }
        .status { font-size: 13px; font-weight: bold; }
        .status.pending { color: #3498db; }
        .status.failed { color: #e74c3c; }
        .status.success { color: #2ecc71; }

        .row { display: flex; justify-content: space-between; margin-bottom: 8px; font-size: 13px; color: #666; }
        .val { color: #333; font-weight: 500; }
        .copy-btn { color: var(--primary); margin-left: 5px; cursor: pointer; }

        .no-data { text-align: center; padding: 50px; color: #999; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h2>Withdraw record</h2>
    </div>

    <div class="tab-scroll">
        <button class="tab active" onclick="loadWithdrawals('all', this)"><i class="fas fa-th-large"></i> All</button>
        <button class="tab" onclick="loadWithdrawals('BANK CARD', this)"><i class="fas fa-credit-card"></i> Bank Card</button>
        <button class="tab" onclick="loadWithdrawals('USDT', this)"><i class="fab fa-ethereum"></i> USDT</button>
    </div>

    <div class="filters">
        <div class="f-select">All <i class="fas fa-chevron-down"></i></div>
        <div class="f-select">date selection <i class="fas fa-chevron-down"></i></div>
    </div>

    <div id="withdrawList">
        <div class="no-data">Loading history...</div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>

    <script>
        // Firebase Config
        const firebaseConfig = { apiKey: "AIzaSyA9a_UA1cbr7sx0G1lu90ig18DfEDvmvgk", projectId: "ff-warzone-9c820", ... };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if(user) { loadWithdrawals('all'); }
            else { window.location.href = 'login.html'; }
        });

        async function loadWithdrawals(type, btn) {
            if(btn) {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                btn.classList.add('active');
            }

            const listArea = document.getElementById('withdrawList');
            const user = auth.currentUser;
            
            // 🔥 Firebase Query: User ke withdrawals load karein
            let query = db.collection("withdrawals").where("uid", "==", user.uid).orderBy("timestamp", "desc");
            
            if(type !== 'all') {
                query = query.where("method", "==", type);
            }

            try {
                const snap = await query.get();
                let html = "";

                if(snap.empty) {
                    html = '<div class="no-data"><p>No withdrawals found</p></div>';
                } else {
                    snap.forEach(doc => {
                        const d = doc.data();
                        const time = d.timestamp ? new Date(d.timestamp.seconds * 1000).toLocaleString() : 'Processing...';
                        const statusClass = d.status === 'pending' ? 'pending' : (d.status === 'failed' ? 'failed' : 'success');
                        const statusText = d.status === 'pending' ? 'To be paid >' : (d.status === 'failed' ? 'Withdraw failed >' : 'done >');

                        html += `
                        <div class="card">
                            <div class="card-header">
                                <span class="tag">Withdrawal</span>
                                <span class="status ${statusClass}">${statusText}</span>
                            </div>
                            <div class="row"><span>Balance</span><span class="val">₹${d.amount.toFixed(2)}</span></div>
                            <div class="row"><span>Type</span><span class="val">${d.method || 'Bank Card'}</span></div>
                            <div class="row"><span>Time</span><span class="val">${time}</span></div>
                            <div class="row">
                                <span>Order number</span>
                                <span class="val">${doc.id.substring(0, 18).toUpperCase()} <i class="far fa-copy copy-btn"></i></span>
                            </div>
                        </div>`;
                    });
                }
                listArea.innerHTML = html;
            } catch (e) {
                listArea.innerHTML = '<p style="text-align:center; color:red;">Error: ' + e.message + '</p>';
            }
        }
    </script>
</body>
</html>
