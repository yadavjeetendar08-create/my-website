<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Withdraw - RajaLuck</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #fb5b5b; --bg: #f8f9fb; --white: #fff; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); padding-bottom: 30px; }
        .header { background: var(--white); padding: 15px; display: flex; align-items: center; justify-content: space-between; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header i { font-size: 18px; cursor: pointer; }
        .header h2 { margin: 0; font-size: 17px; font-weight: bold; }
        
        .balance-card { background: linear-gradient(135deg, #ff8e8e, #fb5b5b); margin: 15px; padding: 20px; border-radius: 12px; color: white; position: relative; }
        .bal-amount { font-size: 26px; font-weight: bold; margin: 10px 0; }

        .withdraw-sec { background: white; margin: 15px; padding: 15px; border-radius: 12px; }
        .input-box { background: #f5f5f5; border-radius: 10px; padding: 12px 15px; margin-top: 10px; display: flex; align-items: center; }
        .input-box input { border: none; background: transparent; flex: 1; outline: none; font-size: 16px; margin-left: 10px; }

        .withdraw-btn { background: #dcdcdc; color: #999; border: none; width: calc(100% - 30px); margin: 20px 15px; padding: 15px; border-radius: 30px; font-size: 16px; font-weight: bold; cursor: pointer; }
        .withdraw-btn.active { background: var(--primary); color: white; }

        /* Wager Progress Bar */
        .wager-box { background: #fff0f0; margin: 15px; padding: 15px; border-radius: 10px; border: 1px dashed var(--primary); }
        .wager-title { font-size: 12px; color: #555; display: flex; justify-content: space-between; }
        .progress-bg { height: 8px; background: #eee; border-radius: 4px; margin-top: 8px; overflow: hidden; }
        .progress-fill { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; }
        .wager-info { font-size: 11px; color: var(--primary); margin-top: 5px; font-weight: bold; }

        .rules { background: white; margin: 15px; padding: 15px; border-radius: 12px; font-size: 12px; line-height: 1.8; color: #777; }
        .rule-item { display: flex; align-items: flex-start; gap: 8px; }
        .rule-item i { color: var(--primary); font-size: 8px; margin-top: 7px; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h2>Withdraw</h2>
        <span style="font-size:12px; color:#666;" onclick="location.href='withdraw_record.html'">History</span>
    </div>

    <div class="balance-card">
        <div style="font-size:12px; opacity:0.9;"><i class="fas fa-wallet"></i> Available Balance</div>
        <div class="bal-amount">₹<span id="displayBal">0.00</span></div>
    </div>

    <div class="wager-box">
        <div class="wager-title">
            <span>Betting Condition (4x)</span>
            <span id="wagerStatus" style="color:red;">Incomplete</span>
        </div>
        <div class="progress-bg">
            <div class="progress-fill" id="wagerBar"></div>
        </div>
        <div class="wager-info">
            Pending Bet Amount: ₹<span id="needBet">0.00</span>
        </div>
    </div>

    <div class="withdraw-sec">
        <div class="input-box">
            <i class="fas fa-indian-rupee-sign" style="color:var(--primary);"></i>
            <input type="number" id="wAmt" placeholder="Enter amount" oninput="checkLimit()">
        </div>
        <div style="display:flex; justify-content:space-between; font-size:11px; color:#999; padding:10px 5px;">
            <span>Withdrawable: <b>₹<span id="smallBal">0.00</span></b></span>
            <span style="color:var(--primary); font-weight:bold; cursor:pointer;" onclick="setAll()">All</span>
        </div>
    </div>

    <button class="withdraw-btn" id="wBtn" onclick="requestWithdraw()">Withdraw</button>

    <div class="rules">
        <div class="rule-item"><i class="fas fa-diamond"></i> <b>4x Wagering Rule:</b> You must bet 4 times your deposit amount before withdrawing.</div>
        <div class="rule-item"><i class="fas fa-diamond"></i> Min Withdraw: <b>₹110.00</b></div>
        <div class="rule-item"><i class="fas fa-diamond"></i> Withdrawal time: <b>00:00 - 23:59</b></div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>

    <script>
        var firebaseConfig = { 
            apiKey: "AIzaSyA9a_UA1cbr7sx0G1lu90ig18DfEDvmvgk", 
            authDomain: "ff-warzone-9c820.firebaseapp.com", 
            projectId: "ff-warzone-9c820", 
            storageBucket: "ff-warzone-9c820.firebasestorage.app", 
            messagingSenderId: "267357764090", 
            appId: "1:267357764090:web:0691111afd07cb0ff20c43" 
        };
        firebase.initializeApp(firebaseConfig);
        var db = firebase.firestore();
        var auth = firebase.auth();
        
        var currentUser = null;
        var currentBalance = 0;
        var wagerLeft = 0; 

        auth.onAuthStateChanged(function(user){
            if(user){
                currentUser = user;
                db.collection("users").doc(user.uid).onSnapshot(function(doc){
                    if(doc.exists){
                        var d = doc.data();
                        currentBalance = d.balance || 0;
                        wagerLeft = d.wager || 0; 

                        // Update UI
                        document.getElementById("displayBal").innerText = currentBalance.toFixed(2);
                        document.getElementById("smallBal").innerText = currentBalance.toFixed(2);
                        document.getElementById("needBet").innerText = wagerLeft.toFixed(2);

                        // Progress Bar Logic
                        if(wagerLeft <= 0) {
                            document.getElementById("wagerStatus").innerText = "Completed";
                            document.getElementById("wagerStatus").style.color = "green";
                            document.getElementById("wagerBar").style.width = "100%";
                        } else {
                            document.getElementById("wagerStatus").innerText = "Incomplete";
                            document.getElementById("wagerStatus").style.color = "red";
                            document.getElementById("wagerBar").style.width = "10%";
                        }
                    }
                });
            } else { location.href="login.html"; }
        });

        function checkLimit() {
            var amt = document.getElementById('wAmt').value;
            var btn = document.getElementById('wBtn');
            if(amt >= 110) btn.classList.add('active'); else btn.classList.remove('active');
        }

        function setAll() {
            if(currentBalance > 0) {
                document.getElementById('wAmt').value = Math.floor(currentBalance);
                checkLimit();
            }
        }

        function requestWithdraw() {
            var amt = Number(document.getElementById('wAmt').value);
            
            // 4x CONDITION CHECK
            if(wagerLeft > 0.5) { // Thoda margin rakha hai float error ke liye
                return alert("⚠️ Withdrawal Locked!\n\nReason: 4x Betting Rule.\nYou need to place bets worth ₹" + wagerLeft + " more.");
            }

            if(amt < 110) return alert("❌ Minimum withdrawal is ₹110");
            if(amt > currentBalance) return alert("❌ Insufficient Balance!");
            
            // Deduct Balance
            db.collection("users").doc(currentUser.uid).update({
                balance: firebase.firestore.FieldValue.increment(-amt)
            }).then(function(){
                db.collection("withdrawals").add({
                    uid: currentUser.uid,
                    amount: amt,
                    status: "pending",
                    time: new Date().toISOString()
                });
                alert("✅ Withdraw Request Sent!");
                location.reload();
            });
        }
    </script>
</body>
</html>
