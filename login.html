<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - RajaLuck</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #ff4747; --bg: #f5f5f5; --text: #333; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
        
        /* Header Design */
        .header { background: linear-gradient(135deg, #ff6b6b, #ff4747); color: white; padding: 25px; padding-bottom: 90px; position: relative; overflow: hidden; }
        .r-logo { position: absolute; right: -10px; top: 10px; font-size: 160px; opacity: 0.1; font-weight: 900; pointer-events: none; }
        .nav-top { display: flex; justify-content: space-between; align-items: center; }
        .header h1 { margin: 30px 0 5px 0; font-size: 26px; font-weight: 600; }
        .header p { font-size: 14px; opacity: 0.9; margin-top: 5px; }
        
        /* Main Content */
        .main { background: white; margin-top: -60px; border-radius: 25px 25px 0 0; padding: 30px 20px; box-shadow: 0 -5px 15px rgba(0,0,0,0.05); min-height: 100vh; }
        
        .input-group { margin-bottom: 20px; }
        .label { display: flex; align-items: center; font-size: 14px; color: #555; margin-bottom: 8px; font-weight: 500; }
        .label i { background: var(--primary); color: white; width: 24px; height: 24px; border-radius: 50%; display: flex; align-items: center; justify-content: center; margin-right: 10px; font-size: 12px; }
        
        .box { display: flex; align-items: center; background: #fff; border: 1px solid #e0e0e0; border-radius: 12px; padding: 0 15px; transition: 0.3s; }
        .box:focus-within { border-color: var(--primary); box-shadow: 0 0 0 3px rgba(255, 71, 71, 0.1); }
        .box input { flex: 1; border: none; padding: 14px 0; outline: none; background: transparent; font-size: 15px; }
        .box i { color: #999; cursor: pointer; padding: 10px; }
        
        .remember { display: flex; justify-content: space-between; align-items: center; font-size: 13px; color: #666; margin: 20px 0; }
        .remember label { display: flex; align-items: center; cursor: pointer; }
        .remember input { margin-right: 8px; accent-color: var(--primary); width: 16px; height: 16px; }
        .forgot { color: var(--primary); text-decoration: none; font-weight: 600; }

        /* Buttons */
        .btn { width: 100%; padding: 15px; border-radius: 30px; border: none; font-size: 16px; font-weight: bold; cursor: pointer; margin-bottom: 15px; transition: transform 0.1s; }
        .btn:active { transform: scale(0.98); }
        .btn-log { background: var(--primary); color: white; box-shadow: 0 5px 15px rgba(255, 71, 71, 0.3); }
        .btn-log:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; }
        .btn-reg { background: white; color: var(--primary); border: 2px solid var(--primary); }
    </style>
</head>
<body>

    <div class="header">
        <div class="r-logo">R</div>
        <div class="nav-top">
            <i class="fas fa-chevron-left" onclick="location.href='index.html'" style="font-size: 20px; cursor: pointer;"></i>
        </div>
        <h1>Welcome Back</h1>
        <p>Please log in with your phone number</p>
    </div>

    <div class="main">
        <div class="input-group">
            <div class="label"><i class="fas fa-mobile-alt"></i> Phone Number</div>
            <div class="box">
                <span style="margin-right:10px; font-weight:bold; color:#555;">+91</span>
                <input type="number" id="lMob" placeholder="Enter mobile number">
            </div>
        </div>

        <div class="input-group">
            <div class="label"><i class="fas fa-lock"></i> Password</div>
            <div class="box">
                <input type="password" id="lPass" placeholder="Enter your password">
                <i class="far fa-eye-slash" id="toggleIcon" onclick="togglePassword()"></i>
            </div>
        </div>

        <div class="remember">
            <label><input type="checkbox" checked> Remember Me</label>
            <a href="#" class="forgot">Forgot Password?</a>
        </div>

        <button class="btn btn-log" id="loginBtn" onclick="login()">Log In</button>
        <button class="btn btn-reg" onclick="location.href='register.html'">Create New Account</button>
        
        <div style="text-align: center; margin-top: 30px;">
            <p style="color: #999; font-size: 12px;">Customer Service 24/7</p>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    
    <script>
        // --- YOUR NEW FIREBASE CONFIG (ff-warzone-9c820) ---
        var firebaseConfig = { 
            apiKey: "AIzaSyA9a_UA1cbr7sx0G1lu90ig18DfEDvmvgk", 
            authDomain: "ff-warzone-9c820.firebaseapp.com", 
            projectId: "ff-warzone-9c820", 
            storageBucket: "ff-warzone-9c820.firebasestorage.app", 
            messagingSenderId: "267357764090", 
            appId: "1:267357764090:web:0691111afd07cb0ff20c43" 
        };
        firebase.initializeApp(firebaseConfig);
        var auth = firebase.auth();

        // 1. Password Visibility Toggle
        function togglePassword() {
            var input = document.getElementById('lPass');
            var icon = document.getElementById('toggleIcon');
            if (input.type === "password") {
                input.type = "text";
                icon.classList.remove("fa-eye-slash");
                icon.classList.add("fa-eye");
                icon.style.color = "var(--primary)";
            } else {
                input.type = "password";
                icon.classList.remove("fa-eye");
                icon.classList.add("fa-eye-slash");
                icon.style.color = "#999";
            }
        }

        // 2. Login Logic
        function login() {
            var m = document.getElementById('lMob').value;
            var p = document.getElementById('lPass').value;
            var btn = document.getElementById('loginBtn');

            if(!m || !p) {
                alert("⚠️ Please enter both phone number and password");
                return;
            }

            // Show Loading
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Logging in...';
            btn.disabled = true;

            // Set Persistence & Login
            auth.setPersistence(firebase.auth.Auth.Persistence.LOCAL)
            .then(function() {
                // Using the phone + @warzone.com logic (Same as Register)
                return auth.signInWithEmailAndPassword(m + "@warzone.com", p);
            })
            .then(function(res) {
                // Success
                btn.innerHTML = 'Success!';
                setTimeout(function() {
                    location.href = "index.html";
                }, 1000);
            })
            .catch(function(e) {
                // Error
                btn.innerHTML = 'Log In';
                btn.disabled = false;
                
                if (e.code === "auth/user-not-found") {
                    alert("❌ Account not found. Please Register first.");
                } else if (e.code === "auth/wrong-password") {
                    alert("❌ Incorrect Password. Try again.");
                } else {
                    alert("Error: " + e.message);
                }
            });
        }
    </script>
</body>
</html>
