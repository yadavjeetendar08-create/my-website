<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Commission Details - RajaLuck</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #fb5b5b; --bg: #f8f9fb; --white: #fff; --orange: #ff9800; }
        body { margin: 0; font-family: sans-serif; background: var(--bg); padding-bottom: 30px; }
        
        /* Header */
        .header { background: white; padding: 15px; display: flex; align-items: center; border-bottom: 1px solid #eee; position: sticky; top: 0; z-index: 100; }
        .header i { font-size: 20px; color: #333; cursor: pointer; }
        .header h2 { margin: 0; font-size: 18px; flex: 1; text-align: center; color: #333; margin-right: 25px; }

        /* Filters */
        .filter-row { display: flex; gap: 10px; padding: 15px; }
        .filter-box { flex: 1; background: white; border: 1px solid #eee; border-radius: 5px; padding: 10px; font-size: 13px; color: #999; display: flex; justify-content: space-between; }

        /* Commission Card Style */
        .comm-card { background: white; margin: 0 15px 15px; border-radius: 10px; overflow: hidden; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .card-header { background: var(--primary); color: white; padding: 10px 15px; display: flex; justify-content: space-between; font-size: 12px; }
        .data-row { display: flex; justify-content: space-between; padding: 12px 15px; border-bottom: 1px solid #f9f9f9; font-size: 14px; }
        .val { font-weight: bold; color: #333; }
        .val-orange { color: var(--orange); font-weight: bold; }
        .val-red { color: var(--primary); font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <i class="fas fa-chevron-left" onclick="history.back()"></i>
        <h2>Commission details</h2>
    </div>

    <div class="filter-row">
        <div class="filter-box"><span>Choose a type</span> <i class="fas fa-chevron-down"></i></div>
        <div class="filter-box"><span>Select a date</span> <i class="fas fa-chevron-down"></i></div>
    </div>

    <div id="displayArea">
        <p style="text-align:center; color:#999; padding:50px;">Checking database...</p>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-firestore-compat.js"></script>
    <script>
        // ⚠️ Apne Firebase ka asli Config yahan dalein
        const firebaseConfig = { apiKey: "AIzaSyA9a_UA1cbr7sx0G1lu90ig18DfEDvmvgk", projectId: "ff-warzone-9c820", authDomain: "ff-warzone-9c820.firebaseapp.com", storageBucket: "ff-warzone-9c820.firebasestorage.app", messagingSenderId: "267357764090", appId: "1:267357764090:web:0691111afd07cb0ff20c43" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        const auth = firebase.auth();

        auth.onAuthStateChanged(user => {
            if(user) { fetchCommission(user.uid); }
            else { window.location.href = 'login.html'; }
        });

        async function fetchCommission(uid) {
            const area = document.getElementById('displayArea');
            try {
                // Database se data lene ki koshish
                const snap = await db.collection("daily_commissions")
                    .where("uplineUID", "==", uid)
                    .orderBy("date", "desc").get();

                if (snap.empty) {
                    // Agar database khali hai toh SCREENSHOT WALA DUMMY DATA dikhao
                    area.innerHTML = `
                        <p style="text-align:center; font-size:12px; color:orange;">(Showing Demo Data - Database is Empty)</p>
                        <div class="comm-card">
                            <div class="card-header"><span>Lottery commission</span><span>2025-12-30 00:00:00</span></div>
                            <div class="card-body">
                                <div class="data-row"><span>Number of bettors</span><span class="val">2 people</span></div>
                                <div class="data-row"><span>Bet amount</span><span class="val">48</span></div>
                                <div class="data-row"><span>Agent level</span><span class="val-red">L0</span></div>
                                <div class="data-row"><span>Commission</span><span class="val-orange">0.24</span></div>
                            </div>
                        </div>
                        <div class="comm-card">
                            <div class="card-header"><span>Lottery commission</span><span>2025-12-29 00:00:00</span></div>
                            <div class="card-body">
                                <div class="data-row"><span>Number of bettors</span><span class="val">1 people</span></div>
                                <div class="data-row"><span>Bet amount</span><span class="val">23</span></div>
                                <div class="data-row"><span>Agent level</span><span class="val-red">L0</span></div>
                                <div class="data-row"><span>Commission</span><span class="val-orange">0.04</span></div>
                            </div>
                        </div>`;
                } else {
                    // REAL DATA logic
                    let html = "";
                    snap.forEach(doc => {
                        const d = doc.data();
                        html += `
                        <div class="comm-card">
                            <div class="card-header"><span>Lottery commission</span><span>${d.dateTime}</span></div>
                            <div class="card-body">
                                <div class="data-row"><span>Number of bettors</span><span class="val">${d.numBettors} people</span></div>
                                <div class="data-row"><span>Bet amount</span><span class="val">${d.betAmount}</span></div>
                                <div class="data-row"><span>Agent level</span><span class="val-red">${d.agentLevel}</span></div>
                                <div class="data-row"><span>Commission</span><span class="val-orange">${d.commission.toFixed(2)}</span></div>
                            </div>
                        </div>`;
                    });
                    area.innerHTML = html;
                }
            } catch (e) {
                area.innerHTML = `<p style="color:red; text-align:center;">Error: ${e.message}</p>`;
            }
        }
    </script>
</body>
</html>
