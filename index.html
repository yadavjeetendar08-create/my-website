<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RAJA LUCK</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 1. Basic Settings */
        :root {
            --primary: #fa5555;
            --bg: #f7f8ff;
            --text: #333;
        }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Segoe UI', sans-serif; background: var(--bg); padding-bottom: 80px; }

        /* 2. Header */
        .header { 
            background: white; padding: 12px 15px; display: flex; justify-content: space-between; align-items: center; 
            position: sticky; top: 0; z-index: 100; box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }
        .logo-box { display: flex; align-items: center; gap: 5px; }
        .logo-text { color: #d99c56; font-size: 20px; font-weight: bold; font-family: serif; letter-spacing: 1px; }
        .crown-icon { color: #d99c56; font-size: 18px; }

        /* 3. Banner */
        .banner-container { padding: 15px; }
        .banner { 
            width: 100%; height: 180px; border-radius: 15px; overflow: hidden; 
            box-shadow: 0 5px 15px rgba(250, 85, 85, 0.3);
        }
        .banner img { width: 100%; height: 100%; object-fit: cover; display: block; }

        /* 4. Marquee Notice */
        .notice-bar { 
            background: white; margin: 0 15px 15px 15px; padding: 8px 10px; border-radius: 20px; 
            display: flex; align-items: center; gap: 10px; font-size: 12px; color: #555;
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
        }

        /* 5. Section Titles */
        .section-header { 
            display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; 
        }
        .sec-title { 
            font-size: 18px; font-weight: 800; color: #333; display: flex; align-items: center; gap: 8px; 
        }
        .sec-title::before { content: ''; width: 4px; height: 20px; background: var(--primary); border-radius: 5px; }

        /* --- LOTTERY CARDS --- */
        .lottery-list { padding: 0 15px; display: flex; flex-direction: column; gap: 12px; }
        .lot-card { 
            height: 110px; border-radius: 15px; padding: 15px; color: white; position: relative; overflow: hidden; 
            display: flex; justify-content: space-between; align-items: center; cursor: pointer;
            box-shadow: 0 4px 10px rgba(255, 100, 100, 0.2); transition: transform 0.1s;
        }
        .lot-card:active { transform: scale(0.98); }
        
        .bg-win { background: linear-gradient(135deg, #ff6b6b, #ff4747); } 
        .bg-trx { background: linear-gradient(135deg, #a18cd1, #fbc2eb); } 
        .bg-5d { background: linear-gradient(135deg, #84fab0, #8fd3f4); }
        
        .lot-info h3 { margin: 0; font-size: 22px; font-weight: 800; }
        .lot-info p { margin: 5px 0 0; font-size: 11px; opacity: 0.9; }
        .lot-img { width: 90px; position: absolute; right: 5px; bottom: 5px; filter: drop-shadow(0 5px 5px rgba(0,0,0,0.2)); }

        /* --- 24 GAMES GRID --- */
        .grid-container { 
            display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; padding: 0 15px 30px 15px; 
        }
        .game-box { 
            background: white; border-radius: 12px; padding: 10px; text-align: center; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05); display: flex; flex-direction: column; align-items: center;
            cursor: pointer; transition: transform 0.1s;
        }
        .game-box:active { transform: scale(0.95); }
        .game-box img { width: 50px; height: 50px; margin-bottom: 5px; object-fit: contain; }
        .game-box span { font-size: 11px; font-weight: 700; color: #444; width: 100%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        /* 6. FLAT BOTTOM NAVIGATION */
        .navbar { 
            position: fixed; bottom: 0; left: 0; width: 100%; background: white; height: 60px;
            display: flex; justify-content: space-around; align-items: center; 
            border-top: 1px solid #eee; z-index: 1000;
        }
        .nav-item { 
            flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center;
            font-size: 10px; color: #999; gap: 4px; cursor: pointer; text-decoration: none; height: 100%;
        }
        .nav-item.active { color: var(--primary); font-weight: bold; }
        .nav-item i { font-size: 20px; }
        .nav-item .fa-gem { color: #999; } 
        .nav-item.active .fa-gem { color: var(--primary); }

    </style>
</head>
